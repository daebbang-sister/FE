name: gemini 코드 리뷰

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "apps/**"
      - "packages/**"
      - ".github/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  gemini-review:
    runs-on: ubuntu-latest

    steps:
      - name: 📂 Github Repository 파일 불러오기
        uses: actions/checkout@v4

      - name: 📦 pnpm 설치
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.2

      - name: 🧩 node.js 설치하기
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: ✅ dependencies 설치
        run: pnpm add -Dw @google/generative-ai

      - name: 🧾 PR diff 파일로 저장
        id: diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -L \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3.diff" \
            "${{ github.event.pull_request.url }}" \
            -o pr.diff
          echo "diff_len=$(wc -c < pr.diff)" >> $GITHUB_OUTPUT

      - name: 🛑 diff 너무 크면 스킵
        if: ${{ steps.diff.outputs.diff_len > 80000 }}
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body:
                "🤖 Gemini 자동 리뷰를 건너뛰었습니다.\n\n" +
                "- PR diff가 너무 커서(> 80,000 chars) 비용 위험이 있습니다.\n" +
                "- PR을 나눠서 올리거나 변경 범위를 줄여주세요.",
            });

      - name: 🤖 Gemini 리뷰 생성
        if: ${{ steps.diff.outputs.diff_len <= 80000 }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const { GoogleGenerativeAI } = require("@google/generative-ai");

          const diff = fs.readFileSync("pr.diff", "utf8");

          const MAX_CHARS = 60000;
          const sliced = diff.length > MAX_CHARS ? diff.slice(0, MAX_CHARS) : diff;

          const genAI = new GoogleGenerativeAI(process.env.GEMINI_API_KEY);

          const model = genAI.getGenerativeModel({
            model: "models/gemini-2.0-flash",
            generationConfig: {
              maxOutputTokens: 800
            }
          });

          const prompt =
            "You are a senior frontend reviewer.\n" +
            "Project: Next.js + TypeScript monorepo.\n\n" +
            "Write in Korean.\n" +
            "Keep the review very short.\n\n" +
            "Format:\n" +
            "요약: 한 줄\n" +
            "문제:\n" +
            "- 최대 3개\n" +
            "개선:\n" +
            "- 최대 3개\n\n" +
            "=== DIFF START ===\n" +
            sliced +
            "\n=== DIFF END ===";

          model.generateContent(prompt)
            .then((result) => {
              const text = result.response.text();

              fs.writeFileSync(
                "gemini_review.md",
                "## 🤖 Gemini 자동 코드리뷰\n" +
                "> 비용 절감을 위해 diff 일부만 전달되었습니다.\n\n" +
                text
              );
            })
            .catch((err) => {
              console.error(err);
              process.exit(1);
            });
          NODE

      - name: 💬 PR에 리뷰 코멘트 달기
        if: ${{ steps.diff.outputs.diff_len <= 80000 }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const pr = context.payload.pull_request;
            const body = fs.readFileSync("gemini_review.md", "utf8");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body,
            });
